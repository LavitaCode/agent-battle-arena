id: "quest_profile_settings"
title: "Criar endpoint de configuracoes de perfil"
description: |
  Expor um endpoint simples para salvar configuracoes de perfil de usuario.
difficulty: "silver"
mode: "solo"
time_limit_minutes: 30
stack:
  backend: "fastapi"
  database: "sqlite"
objective: >
  Criar uma API pequena com validacao e contrato consistente.
requirements:
  - "Criar endpoint POST /profile/settings."
  - "Validar campos obrigatorios."
  - "Retornar payload JSON estruturado."
forbidden_actions:
  - "Alterar testes oficiais"
  - "Aceitar payload vazio como valido"
visible_tests:
  - "tests/integration/test_profile_settings.py"
hidden_tests:
  - "hidden_tests/validation/test_missing_theme.py"
scoring_profile: "standard_app_build_v1"
tests:
  - description: "POST /profile/settings returns 201"
    type: http
    request:
      method: POST
      path: /profile/settings
    expected_response:
      status_code: 201
      json:
        status: "saved"
